name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Verify formatting
        run: |
          fmt=$(gofmt -l cmd internal)
          if [ -n "$fmt" ]; then
            echo "These files are not gofmt-ed:"; echo "$fmt"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build CLI
        run: go build -o rowback ./cmd/rowback

      - name: Build desktop (pure-Go launcher)
        working-directory: desktop
        run: go build -o rowback-desktop .
