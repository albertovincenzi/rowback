version: 2
updates:
  # Go modules for the root CLI module.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  # Go modules for the desktop launcher (separate module).
  - package-ecosystem: gomod
    directory: "/desktop"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  # Keep GitHub Actions pinned and up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
